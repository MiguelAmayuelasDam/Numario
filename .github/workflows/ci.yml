name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend:
    name: Backend (lint + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: finper
          POSTGRES_PASSWORD: finper
          POSTGRES_DB: finper
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U finper -d finper"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://finper:finper@localhost:5432/finper
    steps:
      - uses: actions/checkout@v4
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --frozen
      - name: Ruff (lint)
        run: uv run ruff check .
      - name: Mypy (type check)
        run: uv run mypy app
      - name: Alembic (migraciones)
        run: uv run alembic upgrade head
      - name: Pytest
        run: uv run pytest

  frontend:
    name: Frontend (lint + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: ESLint
        run: npm run lint
      - name: Type check
        run: npm run typecheck
      - name: Vitest
        run: npm run test
      - name: Build
        run: npm run build
