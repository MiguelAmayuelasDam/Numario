name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend:
    name: Backend (lint + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: numario
          POSTGRES_PASSWORD: numario
          POSTGRES_DB: numario
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U numario -d numario"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://numario:numario@localhost:5432/numario
    steps:
      - uses: actions/checkout@v4
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --frozen
      - name: Ruff (lint)
        run: uv run ruff check .
      - name: Mypy (type check)
        run: uv run mypy app
      - name: Alembic (migraciones)
        run: uv run alembic upgrade head
      - name: Pytest
        run: uv run pytest

  frontend:
    name: Frontend (lint + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: ESLint
        run: npm run lint
      - name: Type check
        run: npm run typecheck
      - name: Vitest
        run: npm run test
      - name: Build
        run: npm run build

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Levantar el stack (compose)
        run: docker compose up -d --build
      - name: Esperar a backend y frontend
        run: |
          ok=""
          for _ in $(seq 1 45); do
            if curl -sf http://localhost:8000/health >/dev/null \
               && curl -sf http://localhost:5173 >/dev/null; then
              ok=1; break
            fi
            sleep 2
          done
          if [ -z "$ok" ]; then echo "El stack no arrancó a tiempo"; docker compose logs; exit 1; fi
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Install Playwright (chromium)
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Run E2E
        working-directory: frontend
        run: npm run test:e2e
      - name: Tear down
        if: always()
        run: docker compose down -v
